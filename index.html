y:inline-flex;align-items:center;justify-content:center;gap:5px;min-width:48px;height:36px;border:1px solid rgba(70,43,18,.42);background:linear-gradient(#f7dfaa,#dfb368);font-weight:900}.handbtn small{color:#574022;font-size:.76rem}.handbtn:disabled{opacity:.7}.handbtn.sel{outline:3px solid var(--accent);outline-offset:1px}.board{display:grid;grid-template-columns:repeat(9,1fr);grid-template-rows:repeat(9,1fr);width:min(100%,720px,calc(100vh - 210px));min-width:330px;aspect-ratio:1;border:4px solid var(--line);background:var(--a);box-shadow:0 16px 40px rgba(44,31,20,.18)}.cell{position:relative;display:grid;place-items:center;width:100%;min-width:0;min-height:0;aspect-ratio:1;padding:5px;border:0;border-right:1px solid var(--grid);border-bottom:1px solid var(--grid);background:linear-gradient(90deg,rgba(255,255,255,.1),transparent 44%),var(--b)}.cell.alt{background:linear-gradient(90deg,rgba(255,255,255,.12),transparent 44%),var(--a)}.cell:nth-child(9n){border-right:0}.cell:nth-last-child(-n+9){border-bottom:0}.cell:hover{filter:brightness(1.04)}.cell.sel{box-shadow:inset 0 0 0 4px var(--accent)}.cell.target:after{content:"";position:absolute;width:24%;height:24%;border-radius:50%;background:rgba(23,114,101,.6)}.cell.last{background:linear-gradient(90deg,rgba(255,255,255,.12),transparent 44%),#dfbd69}.piece{position:relative;z-index:1;display:grid;place-items:center;width:78%;height:86%;padding-top:8%;clip-path:polygon(50% 0,92% 24%,82% 100%,18% 100%,8% 24%);border:1px solid #5b3817;background:linear-gradient(#ffe8b2 0%,#f2d7a1 72%,#d7a154);font-family:"Yu Mincho","Hiragino Mincho ProN",serif;font-size:clamp(.82rem,3.4vw,1.9rem);font-weight:900;line-height:1;text-shadow:0 1px 0 rgba(255,255,255,.45);box-shadow:0 3px 5px rgba(54,31,8,.28)}.white{transform:rotate(180deg)}.check{background:linear-gradient(#ffd0bd,#ec8a64)}.coord{position:absolute;color:rgba(40,26,14,.46);font-size:.62rem;font-weight:900;pointer-events:none}.file{right:3px;bottom:1px}.rank{left:3px;top:1px}.side{display:grid;gap:14px;min-width:0}.card{border:1px solid rgba(49,37,27,.16);background:rgba(255,255,255,.76);box-shadow:0 8px 22px rgba(44,31,20,.09)}.status{display:flex;justify-content:space-between;align-items:center;min-height:74px;padding:14px}.turn{font-size:1.3rem;font-weight:900}.dot{width:13px;height:13px;border-radius:50%;background:#b9aea4}.dot.on{background:var(--accent);animation:pulse .9s infinite ease-in-out}@keyframes pulse{0%,100%{transform:scale(.88);opacity:.6}50%{transform:scale(1.18);opacity:1}}.panel{padding:14px}.head{display:flex;justify-content:space-between;gap:10px;align-items:baseline;margin-bottom:10px}.head span,#score{color:var(--muted);font-size:.82rem;font-weight:900}.bar{position:relative;height:18px;overflow:hidden;border:1px solid rgba(49,37,27,.24);background:linear-gradient(90deg,var(--accent) 0 50%,var(--ai) 50% 100%)}.bar:after{content:"";position:absolute;left:50%;top:0;bottom:0;width:2px;background:rgba(255,255,255,.92)}#fill{position:absolute;top:0;bottom:0;background:rgba(255,255,255,.72);transition:left .18s,width .18s}.labels{display:flex;justify-content:space-between;margin-top:6px;color:var(--muted);font-size:.76rem;font-weight:800}.log{display:grid;gap:10px;max-height:330px;overflow:auto}.entry{border-left:3px solid var(--accent);padding-left:10px}.entry p{margin:4px 0 0;font-size:.94rem;line-height:1.55}.time{color:var(--muted);font-size:.74rem;font-weight:900}.moves{display:grid;gap:4px;max-height:180px;margin:0;padding-left:18px;overflow:auto;font-size:.88rem}@media(max-width:900px){.top{align-items:start;flex-direction:column}.controls{justify-content:start}.layout{grid-template-columns:1fr}.board{width:min(100%,calc(100vw - 32px));min-width:0}.handzone{width:min(100%,calc(100vw - 32px));grid-template-columns:104px 1fr}.piece{font-size:clamp(.78rem,5.2vw,1.55rem)}}@media(max-width:700px){body{padding-bottom:34vh}.wrap{width:min(100vw - 16px,1240px);padding-top:10px;padding-bottom:38vh}.top{min-height:auto;gap:8px}h1{font-size:1.55rem}.controls{width:100%;gap:6px}.control,.toggle,.new{flex:1 1 120px;min-height:32px}.new{width:100%;min-height:34px}.layout{gap:8px;margin-top:10px}.handzone{grid-template-columns:1fr;gap:4px;min-height:32px}.handtitle{font-size:.72rem}.hand{min-height:28px}.handbtn{height:30px;min-width:42px}.board{width:min(calc(100vw - 16px),calc(100vh - 295px));min-width:0;border-width:3px}.cell{padding:3px}.side{position:fixed;left:8px;right:8px;bottom:8px;z-index:5;gap:6px;max-height:34vh;overflow:auto}.side .eyebrow{display:none}.status{min-height:42px;padding:8px 10px}.turn{font-size:1rem}.side #evalpanel{padding:8px 10px}.bar{height:10px}.labels{display:none}.side .card:nth-child(3){padding:9px 10px}.side .card:nth-child(4){display:none}.head{margin-bottom:5px}.log{max-height:15vh;gap:6px}.entry p{font-size:.82rem;line-height:1.35}.time{font-size:.68rem}}@media(max-width:390px){.board{width:min(calc(100vw - 16px),calc(100vh - 315px))}}

<body>
<div class="wrap">
<header class="top"><div><p class="eyebrow">Player vs Computer</p><h1>将棋 AI 対局</h1></div><div class="controls"><label class="control"><span>AI強度</span><select id="level"><option value="max">最大</option><option value="medium">中間</option></select></label><label class="toggle"><input id="showbar" type="checkbox" checked><span>戦況バー</span></label><button class="new" id="new">新規対局</button></div></header>
<main class="layout"><section class="table"><div class="handzone op"><div class="handtitle">コンピュータ 持ち駒</div><div class="hand" id="whand"></div></div><div class="board" id="board" aria-label="将棋盤"></div><div class="handzone"><div class="handtitle">あなた 持ち駒</div><div class="hand" id="bhand"></div></div></section><aside class="side"><section class="card status"><div><p class="eyebrow">Turn</p><div class="turn" id="turn"></div></div><div class="dot" id="dot"></div></section><section class="card panel" id="evalpanel"><div class="head"><h2>戦況</h2><span id="score"></span></div><div class="bar"><div id="fill"></div></div><div class="labels"><span>あなた</span><span>AI</span></div></section><section class="card panel"><div class="head"><h2>AI解説</h2><span id="depth"></span></div><div class="log" id="log"></div></section><section class="card panel"><div class="head"><h2>棋譜</h2><span id="count">0手</span></div><ol class="moves" id="moves"></ol></section></aside></main>
</div>
<script type="module">
import * as ShogiNs from "https://esm.sh/shogi.js@5.5.0";
const pkg=ShogiNs.default?.Shogi?ShogiNs.default:ShogiNs;
const {Shogi,Color}=pkg;
const B=Color.Black,W=Color.White,H=B,A=W;
const raw=["FU","KY","KE","GI","KI","KA","HI"],prom=new Set(["FU","KY","KE","GI","KA","HI"]),promed=new Set(["TO","NY","NK","NG","UM","RY"]);
const lab={FU:"歩",KY:"香",KE:"桂",GI:"銀",KI:"金",KA:"角",HI:"飛",OU:"玉",TO:"と",NY:"杏",NK:"圭",NG:"全",UM:"馬",RY:"龍"};
const val={FU:100,KY:320,KE:340,GI:520,KI:650,KA:900,HI:1100,OU:0,TO:590,NY:560,NK:570,NG:600,UM:1150,RY:1350};
const hv={FU:95,KY:300,KE:320,GI:500,KI:620,KA:880,HI:1080};
const q=s=>document.querySelector(s);let g,sel=null,selMoves=[],last=null,thinking=false,over=false,comments=[],hist=[],searchText="",deadline=0,nodes=0;
function opp(c){return c===B?W:B}function cname(c){return c===B?"先手":"後手"}function pl(k,c=B){return k==="OU"?(c===B?"玉":"王"):(lab[k]||k)}function zone(c,y){return c===B?y<=3:y>=7}function rows(c,y){return c===B?y:10-y}function must(k,c,y){return((k==="FU"||k==="KY")&&rows(c,y)<=1)||(k==="KE"&&rows(c,y)<=2)}
function choices(k,c,fy,ty){if(!prom.has(k))return[false];if(must(k,c,ty))return[true];return zone(c,fy)||zone(c,ty)?[false,true]:[false]}
function pseudo(c=g.turn){const out=[];for(let x=1;x<=9;x++)for(let y=1;y<=9;y++){const p=g.get(x,y);if(!p||p.color!==c)continue;for(const m of g.getMovesFrom(x,y)){const t=g.get(m.to.x,m.to.y);if(t?.kind==="OU")continue;for(const pr of choices(p.kind,c,y,m.to.y))out.push({t:"m",fx:x,fy:y,tx:m.to.x,ty:m.to.y,pr,pk:p.kind,cap:t?.kind||null})}}for(const d of g.getDropsBy(c))out.push({t:"d",tx:d.to.x,ty:d.to.y,k:d.kind,c,cap:null});return out}
function apply(m){if(m.t==="d"){g.drop(m.tx,m.ty,m.k,m.c??g.turn);return{}}const cap=g.get(m.tx,m.ty)?.kind||null;g.move(m.fx,m.fy,m.tx,m.ty,m.pr);return{cap}}
function undo(m,u){if(m.t==="d")g.undrop(m.tx,m.ty);else g.unmove(m.fx,m.fy,m.tx,m.ty,m.pr,u.cap)}
function legal(c=g.turn,limit=0){const out=[];for(const m of pseudo(c)){const u=apply(m),bad=g.isCheck(c);undo(m,u);if(!bad){out.push(m);if(limit&&out.length>=limit)break}}return out}
function pos(p,x,y){const prog=p.color===B?9-y:y-1,center=8-(Math.abs(x-5)+Math.abs(y-5));if(p.kind==="FU")return prog*12+center*2;if(p.kind==="KY"||p.kind==="KE")return prog*9+center*2;if(p.kind==="GI")return prog*6+center*7;if(["KI","TO","NY","NK","NG"].includes(p.kind))return center*7+prog*3;if(["KA","UM","HI","RY"].includes(p.kind))return g.getMovesFrom(x,y).length*5+center*4;if(p.kind==="OU")return shelter(p.color,x,y);return 0}
function shelter(c,kx,ky){let s=0;for(let dx=-1;dx<=1;dx++)for(let dy=-1;dy<=1;dy++){if(!dx&&!dy)continue;const x=kx+dx,y=ky+dy;if(x<1||x>9||y<1||y>9){s-=10;continue}const p=g.get(x,y);s+=!p?-3:p.color===c?16:-24}return s}
function evalFor(c){let s=0;for(let x=1;x<=9;x++)for(let y=1;y<=9;y++){const p=g.get(x,y);if(!p)continue;const sign=p.color===c?1:-1;s+=sign*((val[p.kind]||0)+pos(p,x,y))}for(const side of[B,W]){const sign=side===c?1:-1,hs=g.getHandsSummary(side);for(const k of raw)s+=sign*(hs[k]||0)*(hv[k]||0)}if(g.isCheck(opp(c)))s+=180;if(g.isCheck(c))s-=220;return Math.round(s)}
function key(m){return m.t==="d"?`D:${m.k}:${m.tx}:${m.ty}`:`M:${m.fx}:${m.fy}:${m.tx}:${m.ty}:${m.pr?1:0}`}function dist(c,to){let king=null;for(let x=1;x<=9;x++)for(let y=1;y<=9;y++){const p=g.get(x,y);if(p?.color===c&&p.kind==="OU")king={x,y}}return king?Math.abs(king.x-to.x)+Math.abs(king.y-to.y):9}
function mh(m){let s=0;if(m.t==="m"){const p=g.get(m.fx,m.fy),t=g.get(m.tx,m.ty);if(t)s+=(val[t.kind]||0)*12-(val[p.kind]||0);if(m.pr)s+=700;if(promed.has(p.kind))s+=80;s-=dist(opp(p.color),{x:m.tx,y:m.ty})*10}else{s+=(hv[m.k]||0)*2-dist(opp(m.c),{x:m.tx,y:m.ty})*14;if(m.k==="KI"||m.k==="GI")s+=120}return s}function order(ms,pref=null){const pk=pref&&key(pref);return[...ms].sort((a,b)=>pk&&key(a)===pk?-1:pk&&key(b)===pk?1:mh(b)-mh(a))}
function terminal(root,ply){if(g.isCheck(g.turn))return g.turn===root?-999999+ply:999999-ply;return 0}function tick(){nodes++;if((nodes&511)===0&&Date.now()>deadline)throw Error("timeout")}
function ab(depth,alpha,beta,root,ply){tick();const ms=order(legal(g.turn));if(!ms.length)return terminal(root,ply);if(depth<=0&&!g.isCheck(g.turn))return evalFor(root);if(g.turn===root){let best=-1e9;for(const m of ms){const u=apply(m);let sc;try{sc=ab(depth-1,alpha,beta,root,ply+1)}finally{undo(m,u)}best=Math.max(best,sc);alpha=Math.max(alpha,best);if(alpha>=beta)break}return best}else{let best=1e9;for(const m of ms){const u=apply(m);let sc;try{sc=ab(depth-1,alpha,beta,root,ply+1)}finally{undo(m,u)}best=Math.min(best,sc);beta=Math.min(beta,best);if(alpha>=beta)break}return best}}
function search(level){const cfg=level==="medium"?{max:2,ms:700,label:"中間"}:{max:4,ms:2600,label:"最大"};let ms=order(legal(A));if(!ms.length)return{move:null,depth:0,nodes:0,score:terminal(A,0),level:cfg.label};deadline=Date.now()+cfg.ms;nodes=0;let best=ms[0],score=-1e9,done=0;for(let d=1;d<=cfg.max;d++){try{let lb=best,ls=-1e9,a=-1e9;for(const m of order(ms,best)){const u=apply(m);let sc;try{sc=ab(d-1,a,1e9,A,1)}finally{undo(m,u)}if(sc>ls){ls=sc;lb=m}a=Math.max(a,ls)}best=lb;score=ls;done=d}catch(e){break}}return{move:best,depth:done,nodes,score,level:cfg.label}}
const files={1:"１",2:"２",3:"３",4:"４",5:"５",6:"６",7:"７",8:"８",9:"９"},ranks={1:"一",2:"二",3:"三",4:"四",5:"五",6:"六",7:"七",8:"八",9:"九"};
function fmt(m){const sq=`${files[m.tx]}${ranks[m.ty]}`;if(m.t==="d")return`${sq}${pl(m.k,m.c)}打`;const p=g.get(m.fx,m.fy),t=g.get(m.tx,m.ty);return`${sq}${pl(p.kind,p.color)}${t?"取":""}${m.pr?"成":""}(${m.fx}${m.fy})`}
function pct(s){return Math.max(4,Math.min(96,50+Math.tanh(s/1800)*46))}function scoreText(s){if(Math.abs(s)<80)return"互角";return`${s>0?"あなた":"AI"} +${(Math.abs(s)/100).toFixed(1)}`}function adv(s){const side=s>0?"あなた":"AI",a=Math.abs(s);return a<140?"形勢はほぼ互角です":a<550?`${side}が少し指しやすい局面です`:a<1100?`${side}がはっきり良い局面です`:`${side}が優勢です`}
function add(lines){const time=new Intl.DateTimeFormat("ja-JP",{hour:"2-digit",minute:"2-digit"}).format(new Date());comments=[{time,lines},...comments].slice(0,8);renderLog()}function commentary(lastText,res){const hs=evalFor(H),mat=material(H),lines=[lastText?`直近は${lastText}。${adv(hs)}`:`${adv(hs)}。序盤は飛角の働きと玉の安全度が差になりやすいです`];if(g.isCheck(g.turn))lines.push(`${cname(g.turn)}玉に王手がかかっています。受けを最優先に見ています`);else if(Math.abs(mat)>=280)lines.push(`駒割りは${mat>0?"あなた":"AI"}が少し得です。持ち駒を攻めに使える形が焦点です`);else lines.push("駒割りは大きく崩れていません。成り駒作りと王手筋の有無が次の主張です");if(res?.move)lines.push(`AIは${res.depth}手先まで読み、${res.nodes.toLocaleString("ja-JP")}局面を調べました`);return lines}
function material(c){let s=0;for(let x=1;x<=9;x++)for(let y=1;y<=9;y++){const p=g.get(x,y);if(p)s+=(p.color===c?1:-1)*(val[p.kind]||0)}for(const side of[B,W]){const sign=side===c?1:-1,hs=g.getHandsSummary(side);for(const k of raw)s+=sign*(hs[k]||0)*(hv[k]||0)}return s}
function renderLog(){q("#log").innerHTML=comments.map(e=>`<article class="entry"><span class="time">${e.time}</span>${e.lines.map(l=>`<p>${esc(l)}</p>`).join("")}</article>`).join("")}function esc(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]))}
function render(){renderBoard();renderHand(q("#whand"),W);renderHand(q("#bhand"),B);const hs=evalFor(H),p=pct(hs);q("#evalpanel").hidden=!q("#showbar").checked;q("#score").textContent=scoreText(hs);q("#fill").style.left=Math.min(50,p)+"%";q("#fill").style.width=Math.abs(p-50)+"%";q("#turn").textContent=over?"対局終了":thinking?"AI思考中":g.turn===H?"あなたの手番":"AIの手番";q("#dot").classList.toggle("on",thinking);q("#depth").textContent=searchText;q("#count").textContent=`${hist.length}手`;q("#moves").innerHTML=hist.map((m,i)=>`<li>${i+1}. ${m.side} ${m.n}</li>`).join("")}
function renderBoard(){const b=q("#board");b.innerHTML="";for(let row=0;row<9;row++)for(let col=0;col<9;col++){const x=9-col,y=row+1,p=g.get(x,y),btn=document.createElement("button");btn.className="cell"+(row+col&1?"":" alt")+(sel?.type==="board"&&sel.x===x&&sel.y===y?" sel":"")+(selMoves.some(m=>m.tx===x&&m.ty===y)?" target":"")+(last&&(last.tx===x&&last.ty===y||(last.t==="m"&&last.fx===x&&last.fy===y))?" last":"");btn.onclick=()=>cell(x,y);btn.ariaLabel=`${x}${y}`;if(p){const sp=document.createElement("span");sp.className="piece "+(p.color===W?"white ":"")+(g.isCheck(p.color)&&p.kind==="OU"?"check":"");sp.textContent=pl(p.kind,p.color);btn.append(sp)}if(row===8)btn.insertAdjacentHTML("beforeend",`<span class="coord file">${x}</span>`);if(col===8)btn.insertAdjacentHTML("beforeend",`<span class="coord rank">${y}</span>`);b.append(btn)}}
function renderHand(el,c){const hs=g.getHandsSummary(c);el.innerHTML="";let any=false;for(const k of raw){const n=hs[k]||0;if(!n)continue;any=true;const bt=document.createElement("button");bt.className="handbtn"+(sel?.type==="hand"&&sel.k===k?" sel":"");bt.disabled=c!==H||!canAct();bt.innerHTML=`<span>${pl(k,c)}</span><small>${n}</small>`;bt.onclick=()=>hand(k);el.append(bt)}if(!any)el.innerHTML='<span class="empty">なし</span>'}
function canAct(){return g.turn===H&&!thinking&&!over}function clear(){sel=null;selMoves=[]}function hand(k){if(!canAct())return;sel={type:"hand",k};selMoves=legal(H).filter(m=>m.t==="d"&&m.k===k);render()}function cell(x,y){if(!canAct())return;const targets=selMoves.filter(m=>m.tx===x&&m.ty===y);if(targets.length){human(targets);return}const p=g.get(x,y);if(p?.color===H){sel={type:"board",x,y};selMoves=legal(H).filter(m=>m.t==="m"&&m.fx===x&&m.fy===y)}else clear();render()}
function human(ms){let m=ms.length>1?(confirm("成りますか？")?ms.find(x=>x.pr):ms.find(x=>!x.pr)):ms[0];const n=fmt(m);apply(m);last=m;hist.push({side:cname(H),n});clear();searchText="";render();if(done())return;add(commentary(`あなたの${n}`));setTimeout(ai,80)}
function done(){const ms=legal(g.turn,1);if(ms.length)return false;over=true;const msg=g.isCheck(g.turn)?`${cname(g.turn)}玉が詰みました。${cname(g.turn===H?A:H)}の勝ちです`:`${cname(g.turn)}に合法手がありません`;add([msg]);render();return true}
function ai(){if(g.turn!==A||over)return;thinking=true;render();setTimeout(()=>{try{const res=search(q("#level").value);if(!res.move){done();return}const n=fmt(res.move);apply(res.move);last=res.move;hist.push({side:cname(A),n});searchText=`${res.level} ${res.depth}手読み`;add(commentary(`AIの${n}`,res))}catch(e){over=true;add([`AI思考で問題が出ました: ${e.message}`])}finally{thinking=false;clear();render();done()}},30)}
function start(){g=new Shogi();sel=null;selMoves=[];last=null;thinking=false;over=false;comments=[];hist=[];searchText="";add(commentary());render()}q("#new").onclick=start;q("#showbar").onchange=render;q("#level").onchange=()=>{searchText="";render()};start();
</script>
</body>
