<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>将棋 AI 対局</title>
<style>
body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:"Yu Gothic",Meiryo,system-ui,sans-serif;background:#f8f3eb;color:#211a15}.loading{padding:24px;text-align:center}.loading strong{display:block;margin-bottom:8px;font-size:1.1rem}.loading a{color:#177265}
</style>
</head>
<body>
<div class="loading"><strong>将棋 AI 対局を読み込み中</strong><span>更新版を準備しています。</span></div>
<script>
(async()=>{
  const source="https://raw.githack.com/Orleanais360020/Silencebeat/823a4ee5f44c1d12ec1f17ef992641cfb10963be/index.html";
  try{
    let html=await (await fetch(source,{cache:"reload"})).text();
    html=html.replace(
      '.review-item p{margin:4px 0 0;font-size:.9rem;line-height:1.48}@media(max-width:900px)',
      '.review-item p{margin:4px 0 0;font-size:.9rem;line-height:1.48}#lessonpanel:not([hidden]){order:-2}@media(max-width:900px)'
    );
    html=html.replace(
      'function render(){renderReview();renderBoard();',
      'function render(){if(over&&!review.length&&hist.length)makeReview("対局終了。ここまでの指し手から講評します");renderReview();renderBoard();'
    );
    html=html.replace(
      'function done(){if(over)return true;const ms=legal(g.turn,1);',
      'function done(){if(over){if(!review.length&&hist.length)makeReview("対局終了。ここまでの指し手から講評します");render();return true}const ms=legal(g.turn,1);'
    );
    html=html.replace(
      '}catch(e){over=true;add([`AI思考で問題が出ました: ${e.message}`])}finally{thinking=false;clear();render();done()}',
      '}catch(e){over=true;add([`AI思考で問題が出ました: ${e.message}`]);if(!review.length&&hist.length)makeReview("AI思考で止まりました。ここまでの指し手から講評します")}finally{thinking=false;clear();render();done()}'
    );
    document.open();
    document.write(html);
    document.close();
  }catch(e){
    document.body.innerHTML=`<div class="loading"><strong>読み込みに失敗しました</strong><span>${String(e.message||e)}</span><p><a href="${source}">前の版を開く</a></p></div>`;
  }
})();
</script>
</body>
</html>
